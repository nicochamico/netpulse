name: Update NetPulse Feeds

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Sync latest repo
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run feed collector
        run: python scripts/update_feeds.py

      - name: Commit updated data
        run: |
          git config user.name "netpulse-bot"
          git config user.email "netpulse-bot@users.noreply.github.com"
          git add data/*.json
          git commit -m "Update NetPulse feeds" || echo "No changes to commit"
          git push origin main
