name: NetPulse connectors

on:
  schedule:
    - cron: "*/15 * * * *"      # cada 15 min (GitHub puede atrasar algunos min)
  workflow_dispatch:            # ejecucion manual desde la UI

permissions:
  contents: write              # para commitear data/*.json

concurrency:
  group: netpulse-connectors
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run BGP collector
        run: python collectors/bgp_collector.py
        continue-on-error: true

      - name: Run Noise collector
        env:
          ABUSECH_AUTH_KEY: ${{ secrets.ABUSECH_AUTH_KEY }}   # opcional
          GREYNOISE_API_KEY: ${{ secrets.GREYNOISE_API_KEY }} # opcional
        run: python collectors/noise_collector.py
        continue-on-error: true

      - name: Run Exposure collector
        run: python collectors/exposure_collector.py
        continue-on-error: true

      - name: Recompute Risk Score (folds BGP 15%)
        run: python collectors/risk_score.py
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config user.name  "netpulse-bot"
          git config user.email "bot@netpulse.local"
          git add data/*.json
          if git diff --staged --quiet; then
            echo "Sin cambios en data/"
          else
            git commit -m "chore(data): refresh connectors $(date -u +%FT%TZ) [skip ci]"
            git push
          fi
